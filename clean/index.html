<body>
    <div class="container">

          Drag & Drop your file here to clean
          <input type="file" id="fileInput" hidden>
        </div>

  <!-- <button id="downloadBtn" disabled>Download Cleaned File</button> -->

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const downloadBtn = document.getElementById('downloadBtn');

    let cleanedBlobUrl = '';

    function processFile(input){
        const lines = input.split('\n');
        const trimmedLines = lines.map(line => line.trim());
        const cleanedLines = [];
        let emptyLineStreak = false;
        for(const line of trimmedLines){
            if(line === ''){
                if(!emptyLineStreak){
                    cleanedLines.push('');
                    emptyLineStreak = true;
                }
            }   else    {
                cleanedLines.push(line);
                emptyLineStreak = false;
            }
        }
        return cleanedLines.join('\n');
    }

    function removeSQLCABlocks(text) {
      const regex = /SQLCA Information[\s\S]*?sqlstate:.*?(\r?\n|$)/g;
      return text.replace(regex, '');
    }

    function handleFile(file) {
        console.log(file.name);
        const reader = new FileReader();
        reader.onload = function(e) {
        const originalText = e.target.result;
        const cleanedText = removeSQLCABlocks(processFile(originalText));
        // console.log(cleanedText);

        const blob = new Blob([cleanedText], { type: 'text/plain' });
        cleanedBlobUrl = URL.createObjectURL(blob);

        const link = document.createElement('a');
        link.href = cleanedBlobUrl;
        const onlyPranFileName = file.name.split("_");
        link.download = onlyPranFileName[1];
        link.click();

      };
      reader.readAsText(file);
    }

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', e => {
      if (fileInput.files.length) {
        handleFile(fileInput.files[0]);
      }
    });

    downloadBtn.addEventListener('click', () => {

      }
    });
  </script>
