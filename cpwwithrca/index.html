<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DB2 Data Script Export</title>
  <style>
    body {
      background: #1e1f22;
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #ddd;
    }
    .container {
      background: #2b2d31;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      width: 400px;
      z-index: 99;
      animation: fadeIn 0.6s forwards;
    }
    textarea {
      position: relative;
      width: 100%;
      height: 200px;
      padding: 12px;
      background: #1e1f22;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 14px;
      color: #eee;
      box-sizing: border-box;
      resize: vertical;
      outline: none;
      z-index:150;
    }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      background: #8ecae6;
      border: none;
      border-radius: 8px;
      color: #1e1f22;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #9fd4ed;
    }
    #element1, #element2, #element3{
        background-color: #8ecae6;
        display: block;
        position: fixed;
        width: 0vw;
        height: 0vw;
        z-index: 99;
        border-radius: 100%;
        transition: all 1s;
        z-index: 50;
    }
    #element1{
        background-color: #8ecae6;
        z-index: 50;
        margin-top: 15%;
    }
    @keyframes changeSize {
        0%{
            width: 0vw;
            height: 0vw;
            opacity: 1;
        }
        80%{
            width: 150vw;
            height: 150vw;
        }
        100%{
            width: 200vw;
            height: 200vw;
            opacity: 0;
        }
    }

    @keyframes fadeIn {
        0%{
            opacity: 0;
        }
        100%{
            opacity: 1;
        }
    }

    @keyframes fadeOut {
        0%{
            opacity: 1;
        }
        100%{
            opacity: 0;
        }
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: #ccc;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: #1e1f22;
      border: 1px solid #444;
      border-radius: 8px;
      font-size: 14px;
      color: #eee;
      box-sizing: border-box;
    }
    textarea {
      height: 120px;
      resize: vertical;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="input-group">
      <label for="advent">Advent Number</label>
      <input type="text" id="advent" placeholder="Enter Advent Number">
    </div>
    <textarea placeholder="Enter PRAN and ACK lines here..."></textarea>
    <button id="download">Download DB Script</button>
</div>
<div id="element1"></div>


  <script>
    const db2Template = `
db2 -atv "select * from sub.sub_wdr where swd_pran = {pran} with ur" > RAW_DATA_{pran}.txt

db2 -atv "select * from sub.sub_wdr_sch where sws_ack = '{ack}' with ur" >> RAW_DATA_{pran}.txt

db2 -atv "select * from wdr.CONDTN_PART_WDR where CPW_PRAN = {pran} and CPW_WDR_STS='B' with ur" >> RAW_DATA_{pran}.txt

db2 -atv "select * from stl.stl_sub_bal_unt_acc where SSB_PRAN = {pran} with ur" >> RAW_DATA_{pran}.txt

db2 -atv "select * from stl.stl_sub_bal_unt_acc_buckets where SSB_PRAN = {pran} with ur" >> RAW_DATA_{pran}.txt

db2 -atv "select * from stl.STL_SUB_CONTR_CLOSE_BAL where scd_pran = {pran} with ur" >> RAW_DATA_{pran}.txt

db2 -atv "select ssb_pran, ssb_sch_id, ssb_tot_unt, decimal(((SSB_TOT_UNT*(decimal((SCD_SELF_CLOSE_BAL / SCD_TOT_CLOSE_BAL * 100),26,4)))/100),26,4) SSB_SELF_UNT, (SSB_TOT_UNT - decimal(((SSB_TOT_UNT*(decimal((SCD_SELF_CLOSE_BAL / SCD_TOT_CLOSE_BAL * 100),26,4)))/100),26,4)) SSB_EMPLOYER_UNT from stl.stl_sub_bal_unt_acc_buckets, stl.stl_sub_contr_close_bal where ssb_pran = scd_pran and ssb_tier_type = scd_tier_type and ssb_pran = {pran} and SSB_CRTD_TMSTMP in (select max(SSB_CRTD_TMSTMP) from stl.stl_sub_bal_unt_acc_buckets where SSB_PRAN = {pran} with ur) and ssb_tier_type = 'T1' and ssb_tot_unt<>'0.0000' with ur" >> RAW_DATA_{pran}.txt
`;

    const db2FileTemplate = `
echo 'txt generation for {pran}'
db2 "select * from stl.stl_trsn_dtl_buckets where std_pran = {pran} with ur" > {pran}.txt
`;

    function fileName(){
        const advent = document.getElementById('advent').value;
        if(advent == null)
            advent = "";
        return "db2_script_" + advent;
    }

    document.getElementById('download').addEventListener('click', function () {
        // document.getElementById("element1").style.animation = "changeSize 1.5s forwards";
        // setTimeout(() => {
        //     document.getElementById("element1").style.animation = "none";
        // }, 1500);
      const input = document.querySelector('textarea').value.trim();
      const lines = input.split('\n');
      const mainScript = lines.map(line => {
            const parts = line.trim().split(/\s+/);
        return db2Template.replaceAll('{pran}', parts[0]).replaceAll('{ack}', parts[parts.length - 1]);
      }).join('\n\n');
      const fileScript = lines.map(line => {
            const parts = line.trim().split(/\s+/);
            return db2FileTemplate.replaceAll('{pran}', parts[0]).replaceAll('{ack}', parts[parts.length - 1]);
      }).join('\n\n');
      const output = mainScript + "\n\npwd\n\n" + fileScript;
      const blob = new Blob([output], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = window.URL.createObjectURL(blob);
      link.download = fileName();
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);        
      document.getElementsByClassName("container")[0].style.animation = "fadeOut 0.2s forwards";
      setTimeout(() => {
          goToWorkaroundPage();
          console.log("redirected");
      }, 250);
    });


    function goToWorkaroundPage() {
        const adventNumber = document.getElementById('advent').value;
        if (!adventNumber) {
            // alert('Please enter an Advent Number!');
            return;
        }
        const url = `workaround-page.html?advent=${encodeURIComponent(adventNumber)}`;
        window.location.href = url;
    }
  </script>

</body>
</html>
